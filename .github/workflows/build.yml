name: Build MicBoost.exe (C#)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MicBoost.csproj

      - name: Publish
        run: |
          dotnet publish MicBoost.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicBoost-CS-Windows
          path: publish\MicBoost.exe
          retention-days: 30
